<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Search Launcher</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 24px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 8px; }
    .nav { display: flex; gap: 12px; margin-bottom: 20px; }
    .nav a { font-size: 13px; color: #0077b5; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }

    /* Timer bar */
    .timer-bar { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; }
    .timer-clock { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; color: #1a1a1a; min-width: 60px; }
    .timer-clock.urgent { color: #ea4335; }
    .timer-label { font-size: 12px; color: #888; flex: 1; }
    .timer-label strong { display: block; font-size: 13px; color: #1a1a1a; }
    #notify-btn { font-size: 12px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; white-space: nowrap; }
    #notify-btn.enabled { background: #e6f4ea; border-color: #34a853; color: #1e7e34; }
    #reset-btn { font-size: 12px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; }
    #reset-btn:hover { background: #f0f0f0; }

    /* Progress bar */
    .progress-wrap { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 20px; }
    .progress-fill { height: 4px; background: #0077b5; border-radius: 2px; transition: width 10s linear; }
    .progress-fill.urgent { background: #ea4335; }

    /* Sweep summary */
    .sweep-summary { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sweep-stat { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #888; }
    .sweep-stat strong { display: block; font-size: 18px; font-weight: 700; color: #1a1a1a; }

    /* Tier sections */
    .tier { margin-bottom: 28px; }
    .tier-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 8px; }
    .tier-action { font-size: 11px; color: #0077b5; font-weight: 500; }
    .tier-progress { margin-left: auto; font-size: 11px; color: #aaa; }

    /* String rows */
    .string-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: white; border-radius: 8px; margin-bottom: 5px; border: 1px solid #e8e8e8; transition: border-color 0.15s; }
    .string-row:hover { border-color: #0077b5; }
    .string-row.priority { border-left: 3px solid #0077b5; background: #f0f7ff; }
    .string-row.done { border-left: 3px solid #34a853; background: #f6fef8; opacity: 0.75; }
    .string-row.stale { border-left: 3px solid #ea4335; }

    .string-id { font-size: 11px; color: #aaa; min-width: 20px; }
    .string-label { flex: 1; font-size: 14px; }
    .string-row.priority .string-label { font-weight: 600; }

    /* Status indicator dot */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.fresh { background: #34a853; }
    .status-dot.stale { background: #ea4335; }
    .status-dot.idle { background: #ddd; }

    /* Last run label */
    .last-run { font-size: 11px; color: #aaa; white-space: nowrap; min-width: 60px; text-align: right; }
    .last-run.stale { color: #ea4335; }

    /* Badges */
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .badge-blue { background: #0077b5; color: white; }
    .badge-green { background: #e6f4ea; color: #1e7e34; }
    .badge-red { background: #fce8e6; color: #c5221f; }

    a.open-btn { font-size: 12px; color: white; background: #0077b5; padding: 5px 12px; border-radius: 5px; text-decoration: none; white-space: nowrap; }
    a.open-btn:hover { background: #005f8e; }
    a.open-btn.done { background: #34a853; }

    /* Quick log panel */
    .quick-log { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
    .quick-log-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .quick-log-row { display: flex; gap: 8px; align-items: center; }
    .quick-log-row input { flex: 1; padding: 7px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
    .quick-log-row input:focus { outline: none; border-color: #0077b5; }
    .quick-log-row select { padding: 7px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; background: white; }
    .quick-log-row button { padding: 7px 16px; font-size: 13px; font-weight: 600; background: #0077b5; color: white; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .quick-log-row button:hover { background: #005f8e; }
    .log-feedback { font-size: 12px; color: #34a853; margin-top: 6px; display: none; }
  </style>
</head>
<body>
  <h1>LinkedIn Search Launcher</h1>
  <p class="subtitle">Open → scan → log hits. Tier 1 strings every 60 min.</p>
  <nav class="nav">
    <a href="lead-scorer.html">→ Lead Scorer</a>
    <a href="pipeline-tracker.html">→ Pipeline Tracker</a>
  </nav>

  <!-- Timer -->
  <div class="timer-bar">
    <div id="timer-clock" class="timer-clock">60:00</div>
    <div class="timer-label">
      <strong id="timer-status">Next sweep due</strong>
      <span id="timer-sub">Start your first sweep to begin the timer</span>
    </div>
    <button id="reset-btn" onclick="resetTimer()">Reset Timer</button>
    <button id="notify-btn" onclick="toggleNotifications()">Enable Alerts</button>
  </div>
  <div class="progress-wrap"><div id="progress-fill" class="progress-fill" style="width:100%"></div></div>

  <!-- Sweep stats -->
  <div class="sweep-summary">
    <div class="sweep-stat"><strong id="stat-sweeps">0</strong>Sweeps today</div>
    <div class="sweep-stat"><strong id="stat-opened">0</strong>Strings opened</div>
    <div class="sweep-stat"><strong id="stat-done">0</strong>Completed</div>
    <div class="sweep-stat"><strong id="stat-stale">0</strong>Overdue</div>
  </div>

  <!-- Quick log -->
  <div class="quick-log">
    <div class="quick-log-title">Quick Log a Hit</div>
    <div class="quick-log-row">
      <select id="ql-string"></select>
      <input id="ql-url" type="url" placeholder="Post URL (paste from LinkedIn)" />
      <input id="ql-title" type="text" placeholder="Poster title" style="max-width:180px" />
      <input id="ql-score" type="number" min="0" max="100" placeholder="Score" style="max-width:70px" />
      <button onclick="quickLog()">+ Log</button>
    </div>
    <div id="log-feedback" class="log-feedback">✓ Logged to pipeline</div>
  </div>

  <div id="app"></div>

  <script>
    const STORAGE_KEY = "li_launcher_v1";
    const TIMER_KEY = "li_timer_v1";
    const SWEEP_KEY = "li_sweeps_v1";
    const INTERVAL_MS = 60 * 60 * 1000; // 60 minutes

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

    function loadTimer() {
      try { return JSON.parse(localStorage.getItem(TIMER_KEY)) || { start: null, notifs: false }; }
      catch { return { start: null, notifs: false }; }
    }
    function saveTimer(t) { localStorage.setItem(TIMER_KEY, JSON.stringify(t)); }

    function loadSweeps() {
      try { return JSON.parse(localStorage.getItem(SWEEP_KEY)) || { today: 0, date: "" }; }
      catch { return { today: 0, date: "" }; }
    }
    function saveSweeps(s) { localStorage.setItem(SWEEP_KEY, JSON.stringify(s)); }

    function today() { return new Date().toISOString().slice(0, 10); }

    // ── Timer ──────────────────────────────────────────────────────────────
    let timerInterval = null;
    let notifFired = false;

    function resetTimer() {
      const t = loadTimer();
      t.start = Date.now();
      saveTimer(t);
      notifFired = false;
      const sweeps = loadSweeps();
      if (sweeps.date !== today()) { sweeps.today = 0; sweeps.date = today(); }
      sweeps.today++;
      saveSweeps(sweeps);
      updateStats();
      tickTimer();
    }

    function tickTimer() {
      const t = loadTimer();
      if (!t.start) {
        document.getElementById("timer-clock").textContent = "60:00";
        document.getElementById("timer-status").textContent = "No sweep started yet";
        document.getElementById("timer-sub").textContent = "Open a Tier 1 string to start the timer";
        document.getElementById("progress-fill").style.width = "100%";
        return;
      }
      const elapsed = Date.now() - t.start;
      const remaining = Math.max(0, INTERVAL_MS - elapsed);
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      const pct = (remaining / INTERVAL_MS) * 100;
      const clock = document.getElementById("timer-clock");
      const fill = document.getElementById("progress-fill");
      clock.textContent = `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      if (remaining === 0) {
        clock.className = "timer-clock urgent";
        fill.className = "progress-fill urgent";
        document.getElementById("timer-status").textContent = "⚠ Sweep overdue!";
        document.getElementById("timer-sub").textContent = "Open Tier 1 strings now";
        if (!notifFired) { fireNotification(); notifFired = true; }
      } else if (remaining < 5 * 60 * 1000) {
        clock.className = "timer-clock urgent";
        fill.className = "progress-fill urgent";
        document.getElementById("timer-status").textContent = "Sweep due soon";
        document.getElementById("timer-sub").textContent = "Get ready to scan Tier 1";
      } else {
        clock.className = "timer-clock";
        fill.className = "progress-fill";
        document.getElementById("timer-status").textContent = "Next sweep in";
        document.getElementById("timer-sub").textContent = "Timer resets when you open a string";
      }
      fill.style.width = pct + "%";
    }

    function fireNotification() {
      if (Notification.permission === "granted") {
        new Notification("LinkedIn Sweep Due", {
          body: "60 minutes passed — time to scan Tier 1 strings",
          icon: "https://www.linkedin.com/favicon.ico",
        });
      }
    }

    function toggleNotifications() {
      const btn = document.getElementById("notify-btn");
      if (Notification.permission === "granted") {
        btn.textContent = "Alerts ON";
        btn.className = "enabled";
        return;
      }
      Notification.requestPermission().then(p => {
        if (p === "granted") {
          btn.textContent = "Alerts ON";
          btn.className = "enabled";
        } else {
          btn.textContent = "Blocked";
        }
      });
    }

    function initNotifyBtn() {
      const btn = document.getElementById("notify-btn");
      if (Notification.permission === "granted") {
        btn.textContent = "Alerts ON";
        btn.className = "enabled";
      }
    }

    // ── Stats ──────────────────────────────────────────────────────────────
    function updateStats() {
      const state = loadState();
      const sweeps = loadSweeps();
      const now = Date.now();
      let opened = 0, done = 0, stale = 0;
      CONFIG.strings.forEach(s => {
        const entry = state[s.id];
        if (!entry) return;
        opened++;
        const age = now - entry.lastRun;
        if (age < INTERVAL_MS) done++;
        else stale++;
      });
      if (sweeps.date !== today()) { sweeps.today = 0; }
      document.getElementById("stat-sweeps").textContent = sweeps.today;
      document.getElementById("stat-opened").textContent = opened;
      document.getElementById("stat-done").textContent = done;
      document.getElementById("stat-stale").textContent = stale;
    }

    // ── String rows ────────────────────────────────────────────────────────
    function encodeLinkedInURL(query) {
      return "https://www.linkedin.com/search/results/content/?keywords=" +
        encodeURIComponent(query) + "&sortBy=date_posted";
    }

    function isPriority(tier) { return tier === 1 || tier === 3; }

    function formatAge(ms) {
      if (ms < 60000) return "just now";
      const m = Math.floor(ms / 60000);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      return `${h}h ago`;
    }

    function markRun(id) {
      const state = loadState();
      state[id] = { lastRun: Date.now() };
      saveState(state);
      resetTimer();
      renderApp();
      updateStats();
    }

    function renderApp() {
      const state = loadState();
      const now = Date.now();
      const app = document.getElementById("app");
      app.innerHTML = "";

      const tierGroups = {};
      CONFIG.strings.forEach(s => {
        if (!tierGroups[s.tier]) tierGroups[s.tier] = [];
        tierGroups[s.tier].push(s);
      });

      Object.keys(tierGroups).sort().forEach(tierKey => {
        const tier = Number(tierKey);
        const t = CONFIG.tiers[tier];
        const strings = tierGroups[tierKey];
        const doneCount = strings.filter(s => state[s.id] && (now - state[s.id].lastRun) < INTERVAL_MS).length;

        const section = document.createElement("div");
        section.className = "tier";
        section.innerHTML = `<div class="tier-header">${t.label}<span class="tier-action">${t.action}</span><span class="tier-progress">${doneCount}/${strings.length} done</span></div>`;

        strings.forEach(s => {
          const entry = state[s.id];
          const age = entry ? now - entry.lastRun : null;
          const isFresh = age !== null && age < INTERVAL_MS;
          const isStale = age !== null && age >= INTERVAL_MS;
          const priority = isPriority(tier);

          let rowClass = "string-row";
          if (isFresh) rowClass += " done";
          else if (isStale) rowClass += " stale";
          else if (priority) rowClass += " priority";

          let dotClass = "status-dot idle";
          if (isFresh) dotClass = "status-dot fresh";
          else if (isStale) dotClass = "status-dot stale";

          let lastRunHtml = '<span class="last-run">Never</span>';
          if (isFresh) lastRunHtml = `<span class="last-run">${formatAge(age)}</span>`;
          else if (isStale) lastRunHtml = `<span class="last-run stale">${formatAge(age)}</span>`;

          let badgeHtml = "";
          if (priority && !isFresh) badgeHtml = '<span class="badge badge-blue">Today</span>';
          if (isFresh) badgeHtml = '<span class="badge badge-green">✓ Done</span>';
          if (isStale) badgeHtml = '<span class="badge badge-red">Overdue</span>';

          const btnClass = isFresh ? "open-btn done" : "open-btn";
          const btnText = isFresh ? "Re-run ↗" : "Open ↗";

          const row = document.createElement("div");
          row.className = rowClass;
          row.innerHTML = `
            <span class="status-dot ${isFresh ? "fresh" : isStale ? "stale" : "idle"}"></span>
            <span class="string-id">${s.id}</span>
            <span class="string-label">${s.label} ${badgeHtml}</span>
            ${lastRunHtml}
            <a class="open-btn ${isFresh ? "done" : ""}" href="${encodeLinkedInURL(s.query)}" target="_blank" rel="noopener" onclick="markRun(${s.id})">${btnText}</a>
          `;
          section.appendChild(row);
        });

        app.appendChild(section);
      });
    }

    // ── Quick Log ──────────────────────────────────────────────────────────
    function quickLog() {
      const stringId = Number(document.getElementById("ql-string").value);
      const url = document.getElementById("ql-url").value.trim();
      const posterTitle = document.getElementById("ql-title").value.trim();
      const score = document.getElementById("ql-score").value.trim();
      if (!url && !posterTitle) return;

      const PIPELINE_KEY = "linkedin_pipeline_v1";
      let leads = [];
      try { leads = JSON.parse(localStorage.getItem(PIPELINE_KEY)) || []; } catch {}
      leads.unshift({
        stringId,
        url,
        posterTitle,
        score: score || "0",
        status: "hit",
        date: today(),
      });
      localStorage.setItem(PIPELINE_KEY, JSON.stringify(leads));
      document.getElementById("ql-url").value = "";
      document.getElementById("ql-title").value = "";
      document.getElementById("ql-score").value = "";
      const fb = document.getElementById("log-feedback");
      fb.style.display = "block";
      setTimeout(() => { fb.style.display = "none"; }, 2000);
    }

    // ── Init ───────────────────────────────────────────────────────────────
    const qlSelect = document.getElementById("ql-string");
    CONFIG.strings.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = `#${s.id} — ${s.label}`;
      qlSelect.appendChild(opt);
    });

    initNotifyBtn();
    renderApp();
    updateStats();
    tickTimer();
    timerInterval = setInterval(() => { tickTimer(); updateStats(); }, 1000);
  </script>
</body>
</html>
