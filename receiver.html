<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pipeline Data Receiver</title>
</head>
<body>
  <script>
    const STORAGE_KEY = "linkedin_pipeline_v1";

    function isAllowedOrigin(origin) {
      if (origin === "null" || origin === null) return true; // file:// local pages
      return origin === "https://www.linkedin.com" ||
             origin === "https://linkedin.com" ||
             origin.endsWith(".linkedin.com");
    }

    window.addEventListener("message", function(event) {
      if (!isAllowedOrigin(event.origin)) {
        console.warn("Rejected postMessage from:", event.origin);
        return;
      }

      const data = event.data;
      if (!data || !data.action) return;

      const replyOrigin = event.origin === "null" ? "*" : event.origin;

      if (data.action === "save_lead" && data.lead) {
        let existing = [];
        try { existing = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}
        existing.unshift(data.lead);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
          event.source.postMessage({ action: "save_confirm", success: true }, replyOrigin);
        } catch(e) {
          event.source.postMessage({ action: "save_confirm", success: false, error: e.message }, replyOrigin);
        }

      } else if (data.action === "get_leads") {
        let leads = [];
        try { leads = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}
        event.source.postMessage({ action: "leads_data", leads: leads }, replyOrigin);

      } else if (data.action === "update_lead" && data.index !== undefined) {
        let leads = [];
        try { leads = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}
        if (leads[data.index]) {
          Object.assign(leads[data.index], data.updates);
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(leads)); } catch(e) {}
        }
        event.source.postMessage({ action: "update_confirm", success: true }, replyOrigin);

      } else if (data.action === "delete_lead" && data.index !== undefined) {
        let leads = [];
        try { leads = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}
        leads.splice(data.index, 1);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(leads)); } catch(e) {}
        event.source.postMessage({ action: "delete_confirm", success: true }, replyOrigin);

      } else if (data.action === "add_lead" && data.lead) {
        let existing = [];
        try { existing = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}
        existing.unshift(data.lead);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
          event.source.postMessage({ action: "add_confirm", success: true }, replyOrigin);
        } catch(e) {
          event.source.postMessage({ action: "add_confirm", success: false, error: e.message }, replyOrigin);
        }
      }
    });
  </script>
</body>
</html>
